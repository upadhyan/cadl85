name: Build and release wheels

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # needed to upload release assets

jobs:
  # -----------------------------------------------------------------------
  # Linux x86_64 (manylinux) — primary target for compute clusters
  # -----------------------------------------------------------------------
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --features python --interpreter python3.9 python3.10 python3.11 python3.12 python3.13
          manylinux: auto  # builds manylinux_2_17 wheels (broadest compatibility)

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-x86_64
          path: dist/*.whl

  # -----------------------------------------------------------------------
  # macOS (universal2 covers both Intel and Apple Silicon)
  # -----------------------------------------------------------------------
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --features python --interpreter python3.9 python3.10 python3.11 python3.12 python3.13 --target universal2-apple-darwin

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-universal2
          path: dist/*.whl

  # -----------------------------------------------------------------------
  # Attach all wheels to the GitHub Release
  # -----------------------------------------------------------------------
  release:
    needs: [linux, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Upload wheels to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
